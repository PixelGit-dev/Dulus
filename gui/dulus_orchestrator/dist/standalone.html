<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dulus AI Orchestrator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dulus: {
                            bg: '#000000', // Pure black
                            panel: '#09090b', // zinc-950
                            surface: '#18181b', // zinc-900
                            primary: '#27272a', // zinc-800 (Dark metallic)
                            accent: '#fbbf24', // amber-400 (Gold)
                            accentGlow: 'rgba(251, 191, 36, 0.2)',
                            text: '#f8fafc', // slate-50
                            muted: '#a1a1aa', // zinc-400
                            border: 'rgba(255, 255, 255, 0.08)'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'spin-slow': 'spin 12s linear infinite',
                        'galaxy-spin': 'galaxy-spin 120s linear infinite',
                        'comet-1': 'comet 10s linear infinite',
                        'comet-2': 'comet 18s linear infinite 5s',
                        'comet-3': 'comet 25s linear infinite 12s',
                        'comet-4': 'comet 15s linear infinite 8s',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        'galaxy-spin': {
                            '0%': { transform: 'translate(-50%, -50%) rotate(0deg)' },
                            '100%': { transform: 'translate(-50%, -50%) rotate(360deg)' }
                        },
                        'comet': {
                            '0%': { transform: 'translateX(0) translateY(0)', opacity: '0' },
                            '5%': { opacity: '1' },
                            '20%': { transform: 'translateX(-150vmax) translateY(150vmax)', opacity: '0' },
                            '100%': { transform: 'translateX(-150vmax) translateY(150vmax)', opacity: '0' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #000000;
            color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            overflow: hidden;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(161, 161, 170, 0.2);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(251, 191, 36, 0.5);
        }

        /* Glassmorphism utilities */
        .glass-panel {
            background: rgba(9, 9, 11, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
        .glass-input:focus {
            outline: none;
            border-color: rgba(251, 191, 36, 0.5);
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.1);
        }

        /* Cosmic Background */
        .cosmic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 255, 255, 0.02), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(251, 191, 36, 0.05), transparent 25%);
            background-color: #000000;
        }
    </style>
